name: Build and Release Android Native APK

on:
  push:
    branches:
      - main # 每次推送到 main 分支自动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 环境 (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Gradle 环境并明确指定兼容版本
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4' # 🌟 强制使用与项目兼容的 Gradle 8.4 版本

      - name: 编译并签名 Release 版 APK
        run: gradle :app:assembleRelease

      - name: 创建 GitHub Release 并发布
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Unraid Manager Native v1.0.${{ github.run_number }}"
          body: "✨ 自动打包的安卓原生版本。\n\n包含固定签名，版本号已自动递增，可直接下载覆盖安装。"
          files: app/build/outputs/apk/release/app-release.apk