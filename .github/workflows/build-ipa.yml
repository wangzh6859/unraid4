name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Install Dependencies
        run: npm install

      # ⚠️ 关键修改：在 Prebuild 之前动态注入 run_number
      - name: Bump version using Run Number
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('app.json'));
            const rn = process.env.GITHUB_RUN_NUMBER;
            
            data.expo.version = '1.0.' + rn;
            if (!data.expo.ios) data.expo.ios = {};
            data.expo.ios.buildNumber = rn.toString();
            
            fs.writeFileSync('app.json', JSON.stringify(data, null, 2));
            console.log('✅ Updated App Version to ' + data.expo.version + ' and iOS Build Number to ' + rn);
          "

      # 此时 Prebuild 会读取上面修改好的 app.json，将其写入原生的 Info.plist 中
      - name: Clean and Generate iOS Project
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod repo remove master || true
          pod install --repo-update --verbose
          
          if [ ! -f Podfile.lock ]; then
            echo "❌ Podfile.lock not created"
            exit 1
          fi

      - name: Inject ExpoAppDelegate
        run: |
          cd ios
          PROJECT_NAME=(ls|grep−E"\.xcodeproj(ls | grep -E "\.xcodeproj" | head -1 | sed 's/\.xcodeproj$//')
          EXPO_DELEGATE=../node_modules/expo-modules-core/ios/AppDelegates/ExpoAppDelegate.swift
          
          for path in "PROJECTNAME/AppDelegate.swift""PROJECT_NAME/AppDelegate.swift" "PROJECT_NAME/$PROJECT_NAME/AppDelegate.swift"; do
            if [ -f "$path" ]; then
              cp "EXPODELEGATE""EXPO_DELEGATE" "path"
              rm -f "{path%.*}.m" "{path%.*}.m" "{path%.*}.mm" 2>/dev/null || true
              break
            fi
          done

      - name: Build iOS Archive
        run: |
          cd ios
          PROJECT_NAME=(ls|grep−E"\.xcodeproj(ls | grep -E "\.xcodeproj" | head -1 | sed 's/\.xcodeproj$//')
          if [ -d "$PROJECT_NAME.xcworkspace" ]; then
            xcodebuild -workspace "PROJECTNAME.xcworkspace"−scheme"PROJECT_NAME.xcworkspace" -scheme "PROJECT_NAME" -sdk iphoneos -configuration Release -archivePath build/$PROJECT_NAME.xcarchive archive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO IPHONEOS_DEPLOYMENT_TARGET=13.0
          else
            xcodebuild -project "PROJECTNAME.xcodeproj"−scheme"PROJECT_NAME.xcodeproj" -scheme "PROJECT_NAME" -sdk iphoneos -configuration Release -archivePath build/$PROJECT_NAME.xcarchive archive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO IPHONEOS_DEPLOYMENT_TARGET=13.0
          fi

      - name: Create IPA
        run: |
          mkdir -p ios/build/output
          cd ios/build/*.xcarchive/Products/Applications
          APP_NAME=$(ls | head -1)
          mkdir -p Payload
          cp -R "$APP_NAME" Payload/
          zip -0 -r ../../../../../ios/build/output/Unraid-unsigned.ipa Payload

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ios/build/output/Unraid-unsigned.ipa
          tag_name: ios-v1.0.${{ github.run_number }}
          name: iOS Build v1.0.${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
