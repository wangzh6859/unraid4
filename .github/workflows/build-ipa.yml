name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Dependencies
        run: npm install

      - name: Auto Bump Version
        run: |
          node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('app.json'));
          const buildNumber = process.env.GITHUB_RUN_NUMBER;
          if (data.expo.ios) {
            data.expo.ios.buildNumber = buildNumber.toString();
          } else {
            data.expo.ios = { buildNumber: buildNumber.toString() };
          }
          data.expo.version = '1.0.' + buildNumber;
          fs.writeFileSync('app.json', JSON.stringify(data, null, 2));
          console.log('✅ iOS版本号已更新为: v' + data.expo.version + ' (Build: ' + data.expo.ios.buildNumber + ')');
          "

      - name: Generate Native iOS Code
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Build iOS Archive (Unsigned)
        run: |
          cd ios
          # List files to debug
          ls -la
          # Find the correct workspace name
          WORKSPACE=$(ls *.xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Using workspace: $WORKSPACE, scheme: $SCHEME"
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/Unraid.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create Unsigned IPA
        run: |
          mkdir -p build/ipa
          cd ios/build/Unraid.xcarchive/Products/Applications
          zip -r ../../../../../build/ipa/Unraid-unsigned.ipa Unraid.app

      - name: Upload IPA to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Unraid-iOS-${{ github.run_number }}
          path: build/ipa/Unraid-unsigned.ipa

      - name: Create Release with IPA
        uses: softprops/action-gh-release@v1
        with:
          files: build/ipa/Unraid-unsigned.ipa
          tag_name: ios-v1.0.${{ github.run_number }}
          name: iOS Build v1.0.${{ github.run_number }}
          body: |
            ## Unraid iOS App Build
            
            This is an unsigned IPA for testing purposes.
            
            **Version:** 1.0.${{ github.run_number }}
            **Build Date:** ${{ github.event.head_commit.timestamp }}
            
            ### Installation
            
            This IPA is unsigned. You need to sign it yourself or use tools like:
            - AltStore (https://altstore.io)
            - Sideloadly (https://sideloadly.io)
            - Xcode
            
            ### Changes
            ${{ github.event.head_commit.message }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
