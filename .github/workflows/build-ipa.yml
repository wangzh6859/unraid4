name: build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild iOS native code
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS Archive
        run: |
          cd ios
          # 自动寻找生成的 .xcworkspace 文件并提取 Scheme 名字
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "自动检测到工作区: $WORKSPACE, Scheme: $SCHEME"
          
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/app.xcarchive \
            clean archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Create IPA (Unsigned for TrollStore)
        run: |
          cd ios
          mkdir -p Payload
          # 自动寻找生成的 .app 文件，不写死名字
          APP_PATH=$(find build/app.xcarchive/Products/Applications -name "*.app" | head -n 1)
          cp -R "$APP_PATH" Payload/
          zip -qr Unraid-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unraid-unsigned.ipa
          path: ios/Unraid-unsigned.ipa