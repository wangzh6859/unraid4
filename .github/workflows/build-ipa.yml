name: build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prebuild iOS native code
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS Archive
        run: |
          cd ios
          xcodebuild -workspace unraidmobilemanager.xcworkspace \
            -scheme unraidmobilemanager \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/unraidmobilemanager.xcarchive \
            clean archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Create IPA (Unsigned for TrollStore)
        run: |
          cd ios
          mkdir -p Payload
          cp -R build/unraidmobilemanager.xcarchive/Products/Applications/unraidmobilemanager.app Payload/
          zip -qr Unraid-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unraid-unsigned.ipa
          path: ios/Unraid-unsigned.ipa