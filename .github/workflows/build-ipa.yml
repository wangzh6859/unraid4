name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Install Dependencies
        run: npm install

      - name: Clean and Generate iOS Project
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --clean   # regenerated

      - name: Install CocoaPods
        run: |
          cd ios
          # retry pod install up to 3 times
          for attempt in 1 2 3; do
            echo "Attempt $attempt/3 for pod install"
            pod repo remove master || true
            if pod install --repo-update --verbose; then
              echo "✅ pod install succeeded"
              break
            else
              echo "⚠️ pod install failed on attempt $attempt"
              if [ $attempt -lt 3 ]; then
                sleep 10
              else
                echo "❌ pod install failed after 3 attempts"
                exit 1
              fi
            fi
          done

          if [ ! -f Podfile.lock ]; then
            echo "❌ Podfile.lock not created"
            exit 1
          fi

      - name: Bump version (auto)
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('app.json'));
            const rn = process.env.GITHUB_RUN_NUMBER;
            data.expo.version = '1.0.' + rn;
            if (!data.expo.ios) data.expo.ios = {};
            data.expo.ios.buildNumber = rn.toString();
            fs.writeFileSync('app.json', JSON.stringify(data, null, 2));
            console.log('✅ Updated version to', data.expo.version);
          "

      - name: Inject ExpoAppDelegate
        run: |
          cd ios
          PROJECT_NAME=$(ls *.xcodeproj 2>/dev/null | head -1 | sed 's/\.xcodeproj$//')
          if [ -z "$PROJECT_NAME" ]; then
            echo "❌ No .xcodeproj found – cannot inject ExpoAppDelegate"
            exit 1
          fi
          EXPO_DELEGATE=../node_modules/expo-modules-core/ios/AppDelegates/ExpoAppDelegate.swift
          CANDIDATES=(
            "$PROJECT_NAME/AppDelegate.swift"
            "$PROJECT_NAME/$PROJECT_NAME/AppDelegate.swift"
          )
          for path in "${CANDIDATES[@]}"; do
            if [ -f "$path" ]; then
              echo "✅ Injecting ExpoAppDelegate into $path"
              cp "$EXPO_DELEGATE" "$path"
              rm -f "${path%.*}.m" "${path%.*}.mm" 2>/dev/null || true
              break
            fi
          done

      - name: Build iOS Archive
        run: |
          cd ios
          PROJECT_NAME=$(ls *.xcodeproj 2>/dev/null | head -1 | sed 's/\.xcodeproj$//')
          if [ -d "$PROJECT_NAME.xcworkspace" ]; then
            xcodebuild -workspace "$PROJECT_NAME.xcworkspace" -scheme "$PROJECT_NAME" -sdk iphoneos -configuration Release -archivePath build/$PROJECT_NAME.xcarchive archive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO IPHONEOS_DEPLOYMENT_TARGET=13.0
          else
            xcodebuild -project "$PROJECT_NAME.xcodeproj" -scheme "$PROJECT_NAME" -sdk iphoneos -configuration Release -archivePath build/$PROJECT_NAME.xcarchive archive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO IPHONEOS_DEPLOYMENT_TARGET=13.0
          fi

      - name: Create IPA
        run: |
          mkdir -p ios/build/output
          cd ios/build/*.xcarchive/Products/Applications
          APP_NAME=$(ls | head -1)
          mkdir -p Payload
          cp -R "$APP_NAME" Payload/
          zip -0 -r ../../../../../ios/build/output/Unraid-unsigned.ipa Payload

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ios/build/output/Unraid-unsigned.ipa
          tag_name: ios-v1.0.${{ github.run_number }}
          name: iOS Build v1.0.${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
