name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Install Dependencies
        run: npm install

      - name: Auto Bump Version
        run: |
          node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('app.json'));
          const buildNumber = process.env.GITHUB_RUN_NUMBER;
          if (data.expo.ios) {
            data.expo.ios.buildNumber = buildNumber.toString();
          } else {
            data.expo.ios = { buildNumber: buildNumber.toString() };
          }
          data.expo.version = '1.0.' + buildNumber;
          fs.writeFileSync('app.json', JSON.stringify(data, null, 2));
          console.log('✅ iOS version updated to v' + data.expo.version);
          "

      - name: Generate Native iOS Code (Full Regenerate)
        # 彻底删除并重新生成 iOS 原生项目
        run: |
          rm -rf ios/* || true
          npx expo prebuild --platform ios

      - name: Ensure Expo AppDelegate is present
        # 强制将官方 ExpoAppDelegate.swift 复制到生成的 iOS 项目
        run: |
          set -e
          # 选取 ios 目录下第一个应用目录
          APP_DIR=$(ls ios | egrep -v "Podfile|Podfile.lock|build|Pods|fastlane|\\.xcodeproj|\\.xcworkspace|ExportOptions\\.plist" | head -n1 || true)
          echo "Detected APP_DIR=$APP_DIR"
          if [ -z "$APP_DIR" ]; then
            echo "ERROR: No generated iOS app dir found"
            ls -la ios
            exit 1
          fi
          TARGET_DIR=ios/$APP_DIR
          SRC=node_modules/expo-modules-core/ios/AppDelegates/ExpoAppDelegate.swift
          if [ -f "$SRC" ]; then
            echo "Copying $SRC to $TARGET_DIR/AppDelegate.swift"
            cp "$SRC" "$TARGET_DIR/AppDelegate.swift"
            # 删除可能存在的旧 AppDelegate 文件
            rm -f "$TARGET_DIR/AppDelegate.m" "$TARGET_DIR/AppDelegate.mm" 2>/dev/null || true
          else
            echo "ERROR: ExpoAppDelegate.swift not found"
            exit 1
          fi

      - name: Install CocoaPods Dependencies
        run: |
          cd ios
          pod repo remove master || true
          pod repo add master https://mirrors.tuna.tsinghua.edu.cn/git/CocoaPods/Specs.git
          pod install --repo-update --verbose

      - name: Verify CocoaPods
        run: |
          cd ios
          if [ ! -f Podfile.lock ]; then
            echo "ERROR: Podfile.lock not found"
            ls -la
            exit 1
          fi
          echo "----- Podfile.lock (head) -----"
          head -n 50 Podfile.lock
          echo "----- checking for required Expo native pods -----"
          if ! grep -E "EXFileSystem|ExpoModulesCore|EXConstants" Podfile.lock >/dev/null; then
            echo "ERROR: Required Expo native pods not found"
            exit 1
          fi
          echo "✅ Required Expo pods present"

      - name: Clean Xcode Derived Data
        run: rm -rf ~/Library/Developer/Xcode/DerivedData/*

      - name: Build iOS Archive (Unsigned)
        run: |
          cd ios
          if [ -d "Unraid.xcworkspace" ]; then
            xcodebuild -workspace Unraid.xcworkspace -scheme Unraid -sdk iphoneos -configuration Release -archivePath build/Unraid.xcarchive archive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO IPHONEOS_DEPLOYMENT_TARGET=13.0
          else
            xcodebuild -project Unraid.xcodeproj -scheme Unraid -sdk iphoneos -configuration Release -archivePath build/Unraid.xcarchive archive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO IPHONEOS_DEPLOYMENT_TARGET=13.0
          fi

      - name: Create Unsigned IPA
        run: |
          mkdir -p build/ipa
          cd ios/build/Unraid.xcarchive/Products/Applications
          rm -rf Payload || true
          mkdir -p Payload
          cp -R Unraid.app Payload/
          zip -0 -r ../../../../../build/ipa/Unraid-unsigned.ipa Payload

      - name: Upload IPA to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Unraid-iOS-${{ github.run_number }}
          path: build/ipa/Unraid-unsigned.ipa

      - name: Create Release with IPA
        uses: softprops/action-gh-release@v1
        with:
          files: build/ipa/Unraid-unsigned.ipa
          tag_name: ios-v1.0.${{ github.run_number }}
          name: iOS Build v1.0.${{ github.run_number }}
          body: |
            ## Unraid iOS App Build
            
            This is an unsigned IPA for testing purposes.
            
            **Version:** 1.0.${{ github.run_number }}
            **Build Date:** ${{ github.event.head_commit.timestamp }}
            
            ### Installation
            
            This IPA is unsigned. You need to sign it yourself or use tools like:
            - AltStore (https://altstore.io)
            - Sideloadly (https://sideloadly.io)
            - Xcode
            
            ### Changes
            
            ${{ github.event.head_commit.message }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
