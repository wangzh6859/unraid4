name: Auto Build and Release APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. 计算版本号
      - name: Determine Next Version
        id: next_version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          BASE=$(echo $LATEST_TAG | cut -d. -f1,2)
          FIX=$(echo $LATEST_TAG | cut -d. -f3)
          NEXT_FIX=$((FIX + 1))
          NEXT_TAG="$BASE.$NEXT_FIX"
          PURE_VERSION=$(echo $NEXT_TAG | sed 's/v//')
          echo "tag=$NEXT_TAG" >> $GITHUB_OUTPUT
          echo "pure_version=$PURE_VERSION" >> $GITHUB_OUTPUT

      # 2. 强制修改 buildozer.spec 里的版本号
      - name: Update Version in Spec
        run: |
          sed -i "s/^version =.*/version = ${{ steps.next_version.outputs.pure_version }}/" buildozer.spec

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. 安装环境依赖（补全了所有可能的缺失库）
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev git zip unzip zlib1g-dev libltdl-dev libgmp-dev libssl-dev cmake libsqlite3-dev tk-dev libgdbm-dev libc6-dev libbz2-dev
          pip install --user --upgrade buildozer Cython==0.29.33 virtualenv

      # 4. 恢复或生成固定签名
      - name: Restore Keystore Cache
        id: cache-keystore
        uses: actions/cache@v3
        with:
          path: my.keystore
          key: keystore-fixed-v1

      - name: Generate Keystore if not exists
        if: steps.cache-keystore.outputs.cache-hit != 'true'
        run: |
          keytool -genkey -noprompt -keystore my.keystore -alias unraid_alias \
          -storepass "permanent_password_123" -keypass "permanent_password_123" \
          -dname "CN=UnraidApp" -keyalg RSA -keysize 2048 -validity 10000

      # 5. 打包 APK（核心：增加编译失败检测）
      - name: Build APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # 如果 buildozer 运行失败，立即退出并报错
          yes | buildozer android release || (echo "Buildozer 编译失败！" && exit 1)
          
          # 暴力搜索生成的 APK 并统一移动到当前目录下的 output 文件夹
          mkdir -p ./output_apk
          find . -name "*.apk" -exec cp {} ./output_apk/ \;
          
          # 检查是否真的拿到了 APK
          if [ -z "$(ls -A ./output_apk)" ]; then
            echo "错误：未在任何地方找到生成的 APK 文件！"
            exit 1
          fi
        env:
          ANDROID_KEYSTORE_PASSWORD: "permanent_password_123"
          ANDROID_KEY_ALIAS: "unraid_alias"
          ANDROID_KEY_PASSWORD: "permanent_password_123"

      # 6. 发布 Release
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          # 指向我们刚才暴力搜索出来的目录
          files: output_apk/*.apk
          tag_name: ${{ steps.next_version.outputs.tag }}
          name: Release ${{ steps.next_version.outputs.tag }}
          body: |
            自动构建成功
            版本号: ${{ steps.next_version.outputs.tag }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}