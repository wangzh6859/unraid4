name: Auto Build and Release APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. 自动计算版本号
      - name: Determine Next Version
        id: next_version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          BASE=$(echo $LATEST_TAG | cut -d. -f1,2)
          FIX=$(echo $LATEST_TAG | cut -d. -f3)
          NEXT_FIX=$((FIX + 1))
          NEXT_TAG="$BASE.$NEXT_FIX"
          echo "tag=$NEXT_TAG" >> $GITHUB_OUTPUT

      # 2. 安装 Python 环境和 Buildozer 依赖
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev git zip unzip zlib1g-dev libltdl-dev libgmp-dev libltdl-dev libssl-dev
          pip install --user --upgrade buildozer Cython==0.29.33 virtualenv

      # 3. 恢复/生成签名
      - name: Restore Keystore Cache
        id: cache-keystore
        uses: actions/cache@v3
        with:
          path: my.keystore
          key: keystore-fixed-v1

      - name: Generate Keystore if not exists
        if: steps.cache-keystore.outputs.cache-hit != 'true'
        run: |
          keytool -genkey -noprompt -keystore my.keystore -alias unraid_alias \
          -storepass "permanent_password_123" -keypass "permanent_password_123" \
          -dname "CN=UnraidApp" -keyalg RSA -keysize 2048 -validity 10000

      # 4. 正式打包 (直接运行 buildozer)
      - name: Build APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          buildozer android release
        env:
          VERSION: ${{ steps.next_version.outputs.tag }}
          ANDROID_KEYSTORE_PASSWORD: "permanent_password_123"
          ANDROID_KEY_ALIAS: "unraid_alias"
          ANDROID_KEY_PASSWORD: "permanent_password_123"

      # 5. 发布 Release
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: bin/*.apk
          tag_name: ${{ steps.next_version.outputs.tag }}
          name: Release ${{ steps.next_version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}